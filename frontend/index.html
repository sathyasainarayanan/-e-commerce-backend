<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopFast — Your Online Store</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- TODO: add meta og:tags for social sharing -->
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/">ShopFast</a>
      <nav class="main-nav">
        <a href="/products">Products</a>
        <a href="/orders">My Orders</a>
        <a href="#" id="nav-account">Account</a>
      </nav>
      <div class="header-actions">
        <button class="btn btn-icon" id="cart-btn" aria-label="Cart">
          🛒 <span class="cart-badge" id="cart-count">0</span>
        </button>
        <button class="btn btn-primary" id="auth-btn">Sign In</button>
      </div>
    </div>
  </header>

  <!-- ─── HERO BANNER ─── -->
  <section class="hero">
    <div class="container">
      <h1>Everything You Need, Delivered Fast</h1>
      <p class="hero-sub">Shop thousands of products with same-day dispatch.</p>
      <div class="hero-cta">
        <a href="/products" class="btn btn-primary btn-lg">Browse Products</a>
        <a href="#deals" class="btn btn-outline btn-lg">Today's Deals</a>
      </div>
    </div>
  </section>

  <!-- ─── CATEGORY PILLS ─── -->
  <section class="categories container" id="categories">
    <h2 class="section-title">Shop by Category</h2>
    <div class="category-list" id="category-list">
      <!-- Populated by app.js -->
      <div class="skeleton-pill"></div>
      <div class="skeleton-pill"></div>
      <div class="skeleton-pill"></div>
    </div>
  </section>

  <!-- ─── PRODUCT GRID ─── -->
  <section class="products-section container" id="deals">
    <div class="section-header">
      <h2 class="section-title">Featured Products</h2>
      <div class="sort-controls">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="name">Name</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
        </select>
      </div>
    </div>
    <div class="product-grid" id="product-grid">
      <!-- Populated dynamically by app.js -->
    </div>
    <div class="pagination" id="pagination"></div>
  </section>

  <!-- ─── CART DRAWER ─── -->
  <aside class="cart-drawer" id="cart-drawer" aria-hidden="true">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="btn btn-icon" id="close-cart">✕</button>
    </div>
    <div class="cart-items" id="cart-items">
      <!-- Dynamic -->
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        Total: <strong id="cart-total">$0.00</strong>
      </div>
      <button class="btn btn-primary btn-full" id="checkout-btn">Proceed to Checkout</button>
    </div>
  </aside>
  <div class="cart-overlay" id="cart-overlay"></div>

  <!-- ─── CHECKOUT MODAL ─── -->
  <div class="modal-backdrop" id="checkout-modal" hidden>
    <div class="modal">
      <h2>Checkout</h2>
      <div id="checkout-error" class="alert alert-error" hidden></div>
      <div class="form-group">
        <label for="ship-street">Street Address</label>
        <input type="text" id="ship-street" placeholder="123 Main St" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="ship-city">City</label>
          <input type="text" id="ship-city" placeholder="New York" />
        </div>
        <div class="form-group">
          <label for="ship-zip">ZIP Code</label>
          <input type="text" id="ship-zip" placeholder="10001" />
        </div>
      </div>
      <div class="form-group">
        <label for="ship-country">Country</label>
        <input type="text" id="ship-country" value="US" />
      </div>
      <div class="form-group">
        <label>Payment Method</label>
        <div class="radio-group">
          <label><input type="radio" name="payment" value="card" checked /> Credit Card</label>
          <label><input type="radio" name="payment" value="wallet" /> Wallet</label>
          <label><input type="radio" name="payment" value="cod" /> Cash on Delivery</label>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="cancel-checkout">Cancel</button>
        <button class="btn btn-primary" id="confirm-order-btn">Place Order</button>
      </div>
    </div>
  </div>

  <!-- ─── AUTH MODAL ─── -->
  <div class="modal-backdrop" id="auth-modal" hidden>
    <div class="modal">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>
      <div id="auth-error" class="alert alert-error" hidden></div>
      <div id="login-form">
        <div class="form-group"><label>Email<input type="email" id="login-email" /></label></div>
        <div class="form-group"><label>Password<input type="password" id="login-password" /></label></div>
        <button class="btn btn-primary btn-full" id="login-btn">Sign In</button>
      </div>
      <div id="register-form" hidden>
        <div class="form-group"><label>Email<input type="email" id="reg-email" /></label></div>
        <div class="form-group"><label>Username<input type="text" id="reg-username" /></label></div>
        <div class="form-group"><label>Password<input type="password" id="reg-password" /></label></div>
        <button class="btn btn-primary btn-full" id="register-btn">Create Account</button>
      </div>
    </div>
  </div>

  <!-- ─── TOAST NOTIFICATIONS ─── -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ─── FOOTER ─── -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© 2024 ShopFast Inc.</span>
      <nav>
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/contact">Contact</a>
      </nav>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
